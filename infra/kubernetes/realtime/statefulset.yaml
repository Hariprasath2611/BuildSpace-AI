apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: realtime
  namespace: buildspace-prod
spec:
  serviceName: "realtime-service"
  replicas: 3
  selector:
    matchLabels:
      app: realtime
  template:
    metadata:
      labels:
        app: realtime
    spec:
      containers:
      - name: realtime
        image: buildspace/realtime:latest
        ports:
        - containerPort: 4000
        envFrom:
        - secretRef:
            name: realtime-secrets
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
