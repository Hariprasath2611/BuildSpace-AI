apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: buildspace-ingress
  namespace: buildspace-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/websocket-services: "realtime-service"
spec:
  tls:
  - hosts:
    - app.buildspace.ai
    - api.buildspace.ai
    - ws.buildspace.ai
    secretName: buildspace-tls-secret
  rules:
  - host: app.buildspace.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: api.buildspace.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
  - host: ws.buildspace.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: realtime-service
            port:
              number: 80
