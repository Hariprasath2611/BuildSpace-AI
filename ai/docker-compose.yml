version: '3.8'

services:
  # Redis Message Broker and Queue Backend
  redis:
    image: redis:7-alpine
    container_name: buildspace-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - buildspace-net

  # AI Platform FastAPI API Server
  ai-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buildspace-ai-api
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - REDIS_URL=redis://redis:6379/0
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - redis
    networks:
      - buildspace-net

  # Celery Background Worker
  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buildspace-ai-worker
    command: celery -A workers.celery_app worker --loglevel=info -Q vision,ocr,speech,default -c 2
    environment:
      - ENV=production
      - REDIS_URL=redis://redis:6379/0
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - redis
    networks:
      - buildspace-net

networks:
  buildspace-net:
    driver: bridge

volumes:
  redis_data:
